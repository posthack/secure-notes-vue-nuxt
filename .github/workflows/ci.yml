name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # лок собран npm 11, дефолтный npm 10 в раннере читает его как рассинхрон
      - run: npm i -g npm@11

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      # сборке БД не нужна, но пререндер открывает соединение — даём in-memory
      - run: npm run build
        env:
          DATABASE_URL: ':memory:'

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm i -g npm@11

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          DATABASE_URL: ':memory:'
